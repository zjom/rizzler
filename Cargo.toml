[package]
name = "rizzler"
version = "0.1.0"
authors = ["zjom"]
edition = "2024"
license = "Unlicense"
repository = "https://github.com/zjom/rizzler"
description = "the rizz editor — terminal modal editor with embedded lisp."

[workspace]
members = ["crates/*"]

[workspace.dependencies]
rizz = "0.3.7"

[dependencies]
rizz_editor = { path = "crates/rizz_editor" }
rizz_ui = { path = "crates/rizz_ui" }
crossterm = "0.29.0"
