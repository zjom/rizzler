[package]
name = "rizzler"
version = "0.1.0"
authors = ["zjom"]
edition = "2024"
license = "Unlicense"
repository = "https://github.com/zjom/rizzler"
description = "the rizz editor"

[dependencies]
anyhow = "1.0.102"
bitflags = "2.11.1"
crossterm = "0.29.0"
im = "15.1.0"
ratatui = { version = "0.29", default-features = false, features = ["crossterm"] }
ringbuffer = { workspace = true }
rizz = "0.1.2"
ropey = "1.6.1"
thiserror = "2.0.18"
unicode-width = "0.2"

[workspace.dependencies]
ringbuffer = { path = "crates/ringbuffer", version = "0.1.0" }
